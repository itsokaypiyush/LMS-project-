<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduFlow – Learning Management System</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>

<body class="login-page">

  <div class="login-bg"></div>

  <div class="login-wrapper">

    <div class="brand">
      <div class="brand-icon">🎓</div>
      <h1 class="brand-name">EduFlow</h1>
      <p class="brand-sub">Learning Management System</p>
    </div>

    <!-- ✅ FORM START -->
    <form action="login.php" method="POST">

      <div class="login-card">
        <h2>Welcome back</h2>
        <p class="login-desc">Sign in to access your dashboard</p>

        <div class="role-tabs">
          <button type="button" class="role-tab active" data-role="student">Student</button>
          <button type="button" class="role-tab" data-role="teacher">Teacher</button>
          <button type="button" class="role-tab" data-role="admin">Admin</button>
        </div>

        <!-- hidden role -->
        <input type="hidden" name="role" id="role" value="student">

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" id="email" placeholder="student@university.edu" required/>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" id="password" placeholder="••••••••••" required/>
        </div>

        <div class="form-error" id="loginError"></div>

        <button type="submit" class="btn-login">
          <span class="btn-icon">📖</span>
          <span id="loginBtnText">Sign in as Student</span>
        </button>

        <p class="login-footer-note">
          Secure login with role-based access control
        </p>

        <!-- Optional register link -->
        <p style="text-align:center; margin-top:10px;">
          New user? <a href="register.html">Register</a>
        </p>

      </div>

    </form>
    <!-- ✅ FORM END -->

  </div>

  <script src="login.js"></script>

</body>
</html>
