<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduFlow – Learning Management System</title>
  <link rel="stylesheet" href="/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-bg"></div>
  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <h1 class="brand-name">EduFlow</h1>
      <p class="brand-sub">Learning Management System</p>
    </div>
    <div class="login-card">
      <h2>Welcome back</h2>
      <p class="login-desc">Sign in to access your dashboard</p>
      <div class="role-tabs">
        <button class="role-tab active" data-role="student">Student</button>
        <button class="role-tab" data-role="teacher">Teacher</button>
        <button class="role-tab" data-role="admin">Admin</button>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="student@university.edu"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••••"/>
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn-login" id="loginBtn">
        <span class="btn-icon">📖</span>
        <span id="loginBtnText">Sign in as Student</span>
      </button>
      <p class="login-footer-note">Secure login with role-based access control</p>
    </div>
  </div>
  <script src="/login.js"></script>
</body>
</html>
